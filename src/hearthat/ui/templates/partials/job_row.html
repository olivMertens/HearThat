{% set finished = job.status.value in ("completed", "failed") %}
<tr
  id="job-{{ job.id }}"
  {% if not finished %}
    hx-get="/jobs/{{ job.id }}/progress"
    hx-trigger="every 2s"
    hx-swap="outerHTML"
  {% endif %}
>
  <td class="py-2 pr-4 font-mono text-xs">{{ job.id }}</td>
  <td class="py-2 pr-4 truncate max-w-xs">{{ job.source_path.name }}</td>
  <td class="py-2 pr-4">{{ job.voice.voice_name }}</td>
  <td class="py-2 pr-4">
    {% if job.status.value == "completed" %}
      <span class="text-emerald-700">✓ completed</span>
    {% elif job.status.value == "failed" %}
      <span class="text-rose-700" title="{{ job.error or '' }}">✗ failed</span>
    {% else %}
      <span class="text-slate-700">{{ job.status.value }}</span>
    {% endif %}
  </td>
  <td class="py-2 pr-4">
    <div class="w-full bg-slate-200 rounded h-2 overflow-hidden">
      <div class="gradient-bg h-2" style="width: {{ (job.progress * 100) | round(0) }}%"></div>
    </div>
  </td>
</tr>
