{% extends "base.html" %}
{% block content %}
<section class="rounded-xl bg-white p-6 shadow">
  <h2 class="text-lg font-semibold mb-4">New audiobook</h2>
  <form
    hx-post="/jobs"
    hx-target="#jobs-tbody"
    hx-swap="afterbegin"
    hx-encoding="multipart/form-data"
    class="space-y-4"
  >
    <div>
      <label class="block text-sm font-medium mb-1">PDF file</label>
      <input type="file" name="pdf" accept="application/pdf" required
             class="block w-full rounded border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium mb-1">TTS backend</label>
        <select name="backend"
                class="w-full rounded border border-slate-300 px-3 py-2 text-sm">
          <option value="azure_speech_mai" selected>MAI-Voice-1 (preview, narration)</option>
          <option value="azure_speech_hd">DragonHD / Omni</option>
          <option value="openai_tts">OpenAI gpt-4o-mini-tts</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Voice name</label>
        <input type="text" name="voice_name"
               placeholder="{{ default_voice }}"
               class="w-full rounded border border-slate-300 px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Summary model</label>
        <select name="summary_model"
                class="w-full rounded border border-slate-300 px-3 py-2 text-sm">
          <option value="gpt-5.4-mini" selected>gpt-5.4-mini (reasoning)</option>
          <option value="gpt-4.1-mini">gpt-4.1-mini (non-reasoning)</option>
          <option value="gpt-5.5">gpt-5.5 (premium)</option>
        </select>
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">
        Style / instructions
        <span class="text-xs text-slate-500">(MAI / HD: mstts:express-as · OpenAI: natural language)</span>
      </label>
      <input type="text" name="style"
             placeholder="e.g. calm narrator, slightly amused"
             class="w-full rounded border border-slate-300 px-3 py-2 text-sm" />
    </div>
    <button type="submit"
            class="gradient-bg text-white font-medium px-5 py-2 rounded-md shadow hover:opacity-90">
      Synthesise
    </button>
  </form>
</section>

<section class="rounded-xl bg-white p-6 shadow">
  <h2 class="text-lg font-semibold mb-4">Jobs</h2>
  <table class="min-w-full text-sm">
    <thead class="text-left text-slate-500 border-b">
      <tr>
        <th class="py-2 pr-4">ID</th>
        <th class="py-2 pr-4">Source</th>
        <th class="py-2 pr-4">Voice</th>
        <th class="py-2 pr-4">Status</th>
        <th class="py-2 pr-4 w-64">Progress</th>
      </tr>
    </thead>
    <tbody id="jobs-tbody" class="divide-y">
      {% for job in jobs %}
        {% include "partials/job_row.html" %}
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
